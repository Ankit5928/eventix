spring.application.name=eventix_backend
# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8085

# ===============================
# DATABASE CONFIGURATION (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/eventix_db
spring.datasource.username=postgres
spring.datasource.password=master
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# We use 'validate' because Flyway handles the schema changes (DevOps Best Practice)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FLYWAY (Database Migrations)
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# Show Flyway errors in console
logging.level.org.flywaydb=DEBUG

# ===============================
# SECURITY & JWT (Custom Eventix Settings)
# ===============================
# In production, set JWT_SECRET as an environment variable
eventix.jwt.secret=${JWT_SECRET}
# 86400000 ms = 24 Hours
eventix.jwt.expiration-ms=86400000

# ===============================
# FILE UPLOAD SETTINGS
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
eventix.upload.directory=./uploads
eventix.upload.max-file-size=5242880

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.com.bpl=DEBUG

# STRIPE
stripe.api.key=${STRIPE_SECRET_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
# Master Key for DB Encryption (EM-PAY-001)
encryption.master-key=${ENCRYPTION_MASTER_KEY}





# Email Configuration
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${EMAIL_USER}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SMTP_TIMEOUT:100000}
spring.mail.properties.mail.smtp.writetimeout=${SMTP_TIMEOUT:100000}
spring.mail.properties.mail.smtp.timeout=${SMTP_TIMEOUT:300000}
