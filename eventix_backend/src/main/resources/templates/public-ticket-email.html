<div style="font-family: Arial, sans-serif; padding: 20px;">
    <h2>Welcome to the Event, [(${attendeeName})]! 🎟️</h2>
    <p>We're thrilled to have you join us for <strong>[(${eventTitle})]</strong>.</p>

    <div style="background: #f4f4f4; padding: 15px; border-radius: 8px;">
        <p><strong>When:</strong> [(${eventDate})]</p>
        <p><strong>Where:</strong> [(${eventLocation})]</p>
        <p><strong>Venue Details:</strong> [(${venueDetails})]</p>
    </div>

    <p style="margin-top: 20px;">
        <a href="https://eventix.bluepal.in/public/tickets/[(${orderId})]"
           style="background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">
            View My Tickets
        </a>
    </p>

    <p><small>Don't forget to add this to your calendar!</small></p>
</div>
